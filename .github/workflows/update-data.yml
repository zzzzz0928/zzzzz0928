name: Update Data Daily

on:
  schedule:
    # 每天凌晨3点自动运行
    - cron: '0 3 * * *'
  workflow_dispatch:
  # 手动触发
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("httr", "jsonlite", "dplyr", "stringr", "ggplot2", "tidyr", "showtext"), repos="https://cloud.r-project.org")'

      - name: Fetch latest issue data
        run: |
          # 获取 Issue 1 数据
          gh api repos/D2RS-2026spring/members/issues/1/comments --paginate > /tmp/issue1_comments.json
          
          # 获取 Issue 2 数据
          gh api repos/D2RS-2026spring/members/issues/2/comments --paginate > /tmp/issue2_comments.json

      - name: Render Quarto documents
        run: |
          quarto render issue1_students.qmd --to html
          quarto render issue2_voting.qmd --to html

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add and commit
          git add -A
          git diff --quiet --cached || git commit -m "Update data $(date +%Y-%m-%d)"
          
          # Push to main
          git push origin main

      - name: Deploy to gh-pages
        run: |
          # Checkout gh-pages
          git fetch origin gh-pages
          git checkout gh-pages
          git merge main --no-edit
          
          # Render site
          quarto render
          
          # Add and commit
          git add -A
          git diff --quiet --cached || git commit -m "Deploy $(date +%Y-%m-%d)"
          
          # Push
          git push origin gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 删除7天前的旧提交
  cleanup:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
          persist-credentials: false

      - name: Clean old commits
        run: |
          # 删除7天前的旧提交（保留最近的提交历史）
          git checkout --orphan temp_branch $(git rev-list --before="7 days ago" -n 1 HEAD)
          git commit -m "Cleanup: Remove commits older than 7 days"
          git rebase --onto temp_branch $(git rev-list --before="7 days ago" -n 1 HEAD) main
          git branch -D temp_branch
          
          # 强制推送到远端
          git push origin gh-pages --force
